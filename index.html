<!DOCTYPE html>
<html>

<head>
    <title>Dashboard - NightGuardian</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

</head>

<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-pink-900 text-white flex">
    <div id="loader" class="fixed inset-0 flex items-center justify-center bg-black z-50">
        <div class="text-center">
            <h1 class="text-3xl mb-4 animate-pulse">🌙 NightGuardian</h1>
            <div class="w-40 h-2 bg-gray-700 rounded">
                <div id="progress" class="h-2 bg-purple-500 rounded w-0"></div>
            </div>
            <p class="mt-3 text-sm opacity-70">Initializing System...</p>
        </div>
    </div>
    <!-- Sidebar -->
    <div class="w-64 glass p-5">
        <h1 class="text-xl mb-6">🌙 NightGuardian</h1>
        <a href="index.html" class="block p-2 rounded bg-white/20">Dashboard</a>
        <a href="upload.html" class="block p-2 rounded hover:bg-white/20">Upload</a>
        <a href="chat.html" class="block p-2 rounded hover:bg-white/20">Chat</a>
    </div>

    <!-- Main -->
    <div class="flex-1 p-6 space-y-6">

        <!-- Header -->
        <div class="glass p-5 rounded-2xl flex justify-between">
            <h1 class="text-xl">Dashboard</h1>
            <span id="time"></span>
        </div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="glass p-5 rounded-2xl">
    <h2 class="mb-3">📊 Sleep Trend</h2>
    <canvas id="sleepChart"></canvas>
</div>
        <!-- Stats -->
        <div class="grid grid-cols-4 gap-6">

            <div class="stat-card">
                <i class="fas fa-bed text-2xl mb-2"></i>
                <h2 id="sleep">--%</h2>
                <p>Sleep Quality</p>
            </div>

            <div class="stat-card">
                <i class="fas fa-tint text-2xl mb-2"></i>
                <h2 id="water">--%</h2>
                <p>Hydration</p>
            </div>

            <div class="stat-card">
                <i class="fas fa-utensils text-2xl mb-2"></i>
                <h2 id="food">--%</h2>
                <p>Nutrition</p>
            </div>

            <div class="stat-card">
                <i class="fas fa-exclamation-triangle text-2xl mb-2"></i>
                <h2 id="alertStatus">--</h2>
                <p>Alerts</p>
            </div>

        </div>
<div id="alertBox" class="fixed top-5 right-5 bg-red-600 p-4 rounded hidden">
    🚨 Drowsiness Detected!
</div>
        <!-- Activity Panel -->
        <div class="glass p-5 rounded-2xl">

            <h2 class="mb-3">📌 Recent Activity</h2>

            <ul class="space-y-2 text-sm opacity-80">
                <li>✔ Last scan completed</li>
                <li>✔ Hydration updated</li>
                <li>⚠ Sleep levels slightly low</li>
            </ul>

        </div>

        <!-- Action Buttons -->
        <div class="flex gap-4">

            <button onclick="checkBackend()" class="bg-red-500 px-4 py-2 rounded hover:bg-red-600">
                Check Alert
            </button>

            <button onclick="location.href='upload.html'" class="bg-blue-500 px-4 py-2 rounded hover:bg-blue-600">
                New Scan
            </button>

        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
